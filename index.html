<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Brain Blocks</title>
    <style>
      body {
        font-family: sans-serif;
        padding: 24px;
      }

      canvas {
        border: 1px solid #ddd;
      }
    </style>
  </head>

  <body>
    <script type="module">
      import { prepareWithSegments, layoutWithLines } from 'https://esm.sh/@chenglou/pretext'

      const WIDTH = 640
      const HEIGHT = 520
      const LINE_HEIGHT = 24
      const FONT = '15px sans-serif'
      const PADDING = 16
      const GAP = 18

      const tableData = [
        ['Animal', 'Age'],
        ['Dog', '5'],
        ['Cat', '7'],
        ['Rabbit', '3'],
        ['Turtle', '42'],
        ['Hamster', '2'],
      ]

      const blocks = [
        {
          type: 'table',
          x: 16,
          y: 88,
          width: 240,
          height: 192,
          data: tableData,
        },
        {
          type: 'callout',
          x: 360,
          y: 300,
          width: 240,
          height: 96,
          text: 'Structured blocks can constrain the text flow.',
        },
      ]

      const text =
        'Let’s say we have a sample of animals from a shelter intake form. Their ages are shown in the table. This experiment treats the table as a structured block with its own dimensions. The text does not need to know that the block is a table. It only needs to know where the block is and how much space it takes up. This means the same layout logic could eventually work for images, charts, notes, glossary cards, practice questions, or other structured learning objects. The goal is to separate content structure from layout behavior, then let the rendering system compose them predictably.'

      const canvas = document.createElement('canvas')
      canvas.width = WIDTH
      canvas.height = HEIGHT
      document.body.appendChild(canvas)

      const ctx = canvas.getContext('2d')
      ctx.font = FONT
      ctx.textBaseline = 'alphabetic'

      function lineOverlapsBlock(lineTop, lineBottom, block) {
        return lineBottom > block.y && lineTop < block.y + block.height
      }

      function getLineLayout(lineTop) {
        const lineBottom = lineTop + LINE_HEIGHT

        const overlappingBlocks = blocks.filter(block =>
          lineOverlapsBlock(lineTop, lineBottom, block)
        )

        if (overlappingBlocks.length === 0) {
          return {
            x: PADDING,
            width: WIDTH - PADDING * 2,
          }
        }

        const leftBlock = overlappingBlocks.find(block => block.x < WIDTH / 2)

        if (leftBlock) {
          const x = leftBlock.x + leftBlock.width + GAP
          return {
            x,
            width: WIDTH - x - PADDING,
          }
        }

        const rightBlock = overlappingBlocks.find(block => block.x >= WIDTH / 2)

        if (rightBlock) {
          return {
            x: PADDING,
            width: rightBlock.x - GAP - PADDING,
          }
        }

        return {
          x: PADDING,
          width: WIDTH - PADDING * 2,
        }
      }

      function drawWrappedText(text) {
        const words = text.split(' ')
        let y = PADDING
        let wordIndex = 0

        while (wordIndex < words.length && y < canvas.height - PADDING) {
          const { x, width } = getLineLayout(y)

          let currentWords = []

          while (wordIndex < words.length) {
            const nextWords = [...currentWords, words[wordIndex]]
            const candidate = nextWords.join(' ')

            const prepared = prepareWithSegments(candidate, FONT)
            const layout = layoutWithLines(prepared, width, LINE_HEIGHT)

            if (layout.lineCount > 1 && currentWords.length > 0) {
              break
            }

            currentWords = nextWords
            wordIndex++
          }

          ctx.fillStyle = '#111'
          ctx.fillText(currentWords.join(' '), x, y + LINE_HEIGHT - 6)

          y += LINE_HEIGHT
        }
      }

      function drawTable(block) {
        const colWidths = [160, 80]
        const rowHeight = 32
        let currentY = block.y

        for (let r = 0; r < block.data.length; r++) {
          let currentX = block.x

          for (let c = 0; c < block.data[r].length; c++) {
            const cellWidth = colWidths[c]

            ctx.fillStyle = r === 0 ? '#f3f4f6' : '#fff'
            ctx.fillRect(currentX, currentY, cellWidth, rowHeight)

            ctx.strokeStyle = '#999'
            ctx.strokeRect(currentX, currentY, cellWidth, rowHeight)

            ctx.fillStyle = '#111'
            ctx.fillText(block.data[r][c], currentX + 10, currentY + 21)

            currentX += cellWidth
          }

          currentY += rowHeight
        }
      }

      function drawCallout(block) {
        ctx.fillStyle = '#f8fafc'
        ctx.fillRect(block.x, block.y, block.width, block.height)

        ctx.strokeStyle = '#94a3b8'
        ctx.strokeRect(block.x, block.y, block.width, block.height)

        ctx.fillStyle = '#111'
        ctx.fillText(block.text, block.x + 12, block.y + 32)
      }

      function drawBlocks() {
        for (const block of blocks) {
          if (block.type === 'table') drawTable(block)
          if (block.type === 'callout') drawCallout(block)
        }
      }

      ctx.fillStyle = '#fff'
      ctx.fillRect(0, 0, canvas.width, canvas.height)

      drawBlocks()
      drawWrappedText(text)
    </script>
  </body>
</html>
